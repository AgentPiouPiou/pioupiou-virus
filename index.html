<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status et écrans</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card red" id="card">
    <div class="circle"></div>
    <span id="text">Aucun appareil connecté</span>
    <button id="toggle-btn">Afficher écrans</button>
</div>

<div id="screens-container" style="display:none;"></div>

<!-- 🎮 JOYSTICK -->
<div id="controls" style="display:none;">
    <div class="dpad">
        <button data-dir="up">⬆️</button>
        <div>
            <button data-dir="left">⬅️</button>
            <button data-dir="right">➡️</button>
        </div>
        <button data-dir="down">⬇️</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>

</body>
</html>
