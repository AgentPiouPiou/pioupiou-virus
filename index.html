<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiouPiou Virus Béta V0.1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Statut -->
<div class="card red" id="card">
    <div class="left">
        <div class="circle"></div>
        <span id="text">Aucun appareil connecté</span>
    </div>
    <button id="toggle-btn">Afficher écrans</button>
</div>

<!-- Ecrans -->
<div id="screens-container" style="display:none;"></div>

<!-- Joystick + Slider -->
<div id="controls">
    <div id="joystick">
        <div id="stick"></div>
    </div>
    <div id="slider-container">
        <label for="speed">Vitesse souris</label>
        <input type="range" id="speed" min="1" max="20" value="5">
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
